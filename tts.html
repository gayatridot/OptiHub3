<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OptiHub3 - Text to Speech</title>
  <link rel="stylesheet" href="./style.css">
  <script src="./js/script.js" type="module"></script>
  <script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.0/lame.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <div id="app-header"></div>

  <main class="tts-section">
    <div class="container">
      <div class="tts-header">
        <h2>Text to Speech</h2>
        <p>Convert your text into voiceovers with subtitles.</p>
      </div>

      <div class="tts-card">
        <section>
          <h3 class="section-heading">Enter Your Script</h3>
          <textarea class="script-input" rows="5"
            placeholder="Welcome to ScriptSync! Convert your text into engaging voiceover videos with subtitles in just a few clicks. Let's get started!"></textarea>
        </section>

        <section class="tts-controls">
          <div class="control-group">
            <label for="voice">Voice Selection:</label>
            <select id="voice" class="voice-select">
              <option>Female - English (US)</option>
              <option>Male - English (US)</option>
            </select>
          </div>
          <div class="control-group">
            <label>Subtitles:</label>
            <label class="toggle-switch">
              <input type="checkbox" checked>
              <span class="slider"></span>
            </label>
          </div>
        </section>

        <div class="tts-actions">
          <button class="btn btn-primary btn-generate">Generate Audio</button>
          <button id="btn-retry" class="btn btn-secondary btn-retry" style="display: none;">
            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 4v6h-6M1 20v-6h6"></path>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
            </svg>
            Retry Loading
          </button>
          <button id="btn-fallback" class="btn btn-secondary btn-fallback" style="display: none;">
            Use Browser Voice (Fallback)
          </button>
        </div>
        <div id="tts-status-banner" class="tts-status-banner" style="display: none;"></div>

        <section>
          <h3 class="section-heading">Preview</h3>
          <div class="preview-box">
            <img
              src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRvInZWOS7BxCRODw8KnDcdn1iH-RsyS9WSvQiX6IUdvQ&s=10"
              alt="Preview">
            <div class="preview-overlay">
              <p>Transform your text into captivating voiceovers!</p>
              <div class="audio-player">
                <button class="play-btn" aria-label="Play">▶</button>
                <span>0:05</span>
                <div class="waveform"></div>
                <span>0:32</span>
              </div>
            </div>
          </div>
        </section>

        <section>
          <h3 class="section-heading">Export Your File</h3>
          <button class="btn btn-primary btn-download">
            <svg class="icon-sm" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z" />
            </svg>
            Download MP3
          </button>
        </section>
      </div>
    </div>
  </main>

  <div id="app-footer"></div>
</body>

</html>
